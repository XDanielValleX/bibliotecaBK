# Puerto donde correrá el servidor Backend (por defecto es 8080)
server.port=8080

# ===============================
# CONFIGURACIÓN DE BASE DE DATOS
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/biblioteca_online?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
# PON AQUÍ LA CONTRASEŃA QUE CREASTE AL INSTALAR MYSQL:
spring.datasource.password=root

# ===============================
# CONFIGURACIÓN DE JPA / HIBERNATE
# ===============================
# "update" verifica las tablas existentes y las actualiza si hay cambios en tu código Java
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect